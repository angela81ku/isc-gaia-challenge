services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - ISC_CPF_MERGE_FILE=/home/irisowner/dev/merge.cpf
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - 1972
      - 52773
      - 53773
    volumes:
      - ./:/home/irisowner/dev
    entrypoint: ["/bin/bash", "/home/irisowner/dev/startup.sh"]
